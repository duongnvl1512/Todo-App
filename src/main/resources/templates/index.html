<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Todo App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="mb-4 text-center">Todo Management</h2>

      <!-- Add Todo -->
      <form th:action="@{/add}" th:object="${todoRequest}" method="post">
        <div class="row">
          <div class="col-md-5">
            <input
              class="form-control"
              placeholder="Title"
              th:field="*{title}"
            />
            <div
              class="text-danger mt-1"
              th:if="${#fields.hasErrors('title')}"
              th:errors="*{title}"
            ></div>
          </div>

          <div class="col-md-5">
            <input
              class="form-control"
              placeholder="Description"
              th:field="*{description}"
            />

            <div
              class="text-danger mt-1"
              th:if="${#fields.hasErrors('description')}"
              th:errors="*{description}"
            ></div>
          </div>

          <div class="col-md-2">
            <button class="btn btn-primary w-100">Add Todo</button>
          </div>
        </div>
      </form>

      <hr />

      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h5>Total</h5>

              <h2 th:text="${total}"></h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h5>Pending</h5>

              <h2 th:text="${pending}"></h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <h5>Completed</h5>

              <h2 th:text="${completed}"></h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Search + Filter -->

      <div class="row mb-3">
        <div class="col-md-8">
          <form method="get" th:action="@{/}">
            <div class="input-group">
              <input
                name="keyword"
                class="form-control"
                placeholder="Search by title..."
              />

              <button class="btn btn-dark">Search</button>
            </div>
          </form>
        </div>

        <div class="col-md-4">
          <form method="get" th:action="@{/}">
            <select
              class="form-select"
              name="status"
              onchange="this.form.submit()"
            >
              <option value="">Filter Status</option>

              <option value="PENDING">Pending</option>

              <option value="COMPLETED">Completed</option>
            </select>
          </form>
        </div>
      </div>

      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>

            <th>Title</th>

            <th>Description</th>

            <th>Status</th>

            <th width="260">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${#lists.isEmpty(todos)}">
            <td colspan="5" class="text-center">No Todo Found</td>
          </tr>

          <tr th:each="todo : ${todos}">
            <td th:text="${todo.id}"></td>

            <td th:text="${todo.title}"></td>

            <td th:text="${todo.description}"></td>

            <td>
              <span
                class="badge bg-warning"
                th:if="${todo.status.name()=='PENDING'}"
              >
                Pending
              </span>

              <span
                class="badge bg-success"
                th:if="${todo.status.name()=='COMPLETED'}"
              >
                Completed
              </span>
            </td>

            <td>
              <button
                class="btn btn-warning btn-sm edit-btn"
                data-bs-toggle="modal"
                data-bs-target="#editModal"
                th:attr="
                    data-id=${todo.id},
                    data-title=${todo.title},
                    data-description=${todo.description}
                "
              >
                Edit
              </button>

              <a
                class="btn btn-success btn-sm"
                th:href="@{/toggle/{id}(id=${todo.id})}"
              >
                Toggle
              </a>

              <a
                class="btn btn-danger btn-sm"
                onclick="return confirm('Delete this todo?');"
                th:href="@{/delete/{id}(id=${todo.id})}"
              >
                Delete
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="editForm" method="post">
            <div class="modal-header">
              <h5 class="modal-title">Edit Todo</h5>

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label"> Title </label>

                <input
                  id="editTitle"
                  name="title"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label"> Description </label>

                <textarea
                  id="editDescription"
                  name="description"
                  class="form-control"
                  rows="4"
                >
                </textarea>
              </div>
            </div>

            <div class="modal-footer">
              <button
                class="btn btn-secondary"
                type="button"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>

              <button class="btn btn-primary" type="submit">
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.querySelectorAll(".edit-btn").forEach((button) => {
        button.addEventListener("click", function () {
          document.getElementById("editTitle").value = this.dataset.title;

          document.getElementById("editDescription").value =
            this.dataset.description;

          document.getElementById("editForm").action =
            "/update/" + this.dataset.id;
        });
      });
    </script>
  </body>
</html>
